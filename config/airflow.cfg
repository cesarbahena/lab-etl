# Airflow Configuration for LIMS ETL

[core]
dags_folder = /opt/airflow/dags
base_log_folder = /opt/airflow/logs
executor = LocalExecutor
parallelism = 4
dag_concurrency = 2
max_active_runs = 4
load_examples = False

[database]
sql_alchemy_conn = postgresql://quimios_dev:dev_password@postgres:5432/quimios_dev

[logging]
base_log_folder = /opt/airflow/logs
remote_logging = False
logging_level = INFO

[scheduler]
job_heartbeat_sec = 5
scheduler_heartbeat_sec = 5
num_runs = -1
scheduler_idle_timeout = 60

[webserver]
web_server_worker_timeout = 120
workers = 2
worker_refresh_batch_size = 1
worker_refresh_interval = 6000